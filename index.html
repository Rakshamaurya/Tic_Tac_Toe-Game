<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="outerContainer hide1">
     
      <button class="restart ">Restart Button</button>
    </div>
     <h2><b>Tic-Tac-Toe</b></h2>
    <div class="outerContainer ">
        <p id="msg"></p>
    </div>
   

    <div class="container">
      <div class="gamebox">
        <button class="box 00"></button>
        <button class="box 01"></button>
        <button class="box 02"></button>

        <button class="box 10"></button>
        <button class="box 11"></button>
        <button class="box 12"></button>

        <button class="box 20"></button>
        <button class="box 21"></button>
        <button class="box 22"></button>
        <!-- <button class="row1">o</button> -->
      </div>
    </div>

    <button class="reset rbtn">Reset button</button>
    <script src="script.js"></script>
  </body>
</html>
